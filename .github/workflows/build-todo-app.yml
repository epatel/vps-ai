name: Build Todo App

on:
  push:
    branches: [main]
    paths:
      - 'projects/todo-app/**'

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.head_commit.author.username != 'github-actions[bot]'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: projects/todo-app
        run: |
          flutter pub get
          flutter build web --base-href /todo-app/ --release

      - name: Push build output to branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f projects/todo-app/build/web
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="build/todo-app-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "Build todo-app web output"
          git push -u origin "$BRANCH"
          echo "Branch '$BRANCH' pushed. Create a PR manually to merge."
