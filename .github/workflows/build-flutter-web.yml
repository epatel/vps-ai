name: Build Flutter Web Apps

on:
  push:
    branches: [main]
    paths:
      - 'projects/**/**.dart'
      - 'projects/**/pubspec.yaml'
      - 'projects/**/pubspec.lock'
      - 'projects/**/web/**'
  pull_request:
    paths:
      - 'projects/**/**.dart'
      - 'projects/**/pubspec.yaml'
      - 'projects/**/pubspec.lock'
      - 'projects/**/web/**'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.find.outputs.projects }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: find
        name: Detect changed Flutter projects
        run: |
          PROJECTS=$(git diff --name-only HEAD~1 HEAD \
            | grep '^projects/' \
            | cut -d/ -f2 \
            | sort -u \
            | while read dir; do
                [ -f "projects/$dir/pubspec.yaml" ] && echo "$dir"
              done \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "projects=$PROJECTS" >> "$GITHUB_OUTPUT"
          echo "Detected Flutter projects: $PROJECTS"

  build:
    needs: detect
    if: needs.detect.outputs.projects != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project: ${{ fromJson(needs.detect.outputs.projects) }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: projects/${{ matrix.project }}
        run: |
          flutter pub get
          flutter build web --base-href /${{ matrix.project }}/ --pwa-strategy=none --release

      - name: Deploy to VPS
        id: deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          rsync -az --delete -e 'ssh -i ~/.ssh/id_ed25519' \
            projects/${{ matrix.project }}/build/web/ \
            epatel@ai.memention.net:${{ matrix.project }}/build/web/

      - name: Post status-page event
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          STATUS_LOG_TOKEN: ${{ secrets.STATUS_LOG_TOKEN }}
        run: |
          [ -n "$STATUS_LOG_TOKEN" ] || exit 0
          if [ "${{ job.status }}" = "success" ]; then
            MSG="deploy ${{ matrix.project }} ok"
          else
            MSG="deploy ${{ matrix.project }} FAILED"
          fi
          curl -fsS -m 5 -X POST https://ai.memention.net/status/log \
            -H "Authorization: Bearer $STATUS_LOG_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$(jq -nc --arg m "$MSG" '{source:"ci", message:$m}')" || true
