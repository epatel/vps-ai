name: Build Flutter Demo

on:
  push:
    branches: [main]
    paths:
      - 'projects/flutter_demo/**'
      - '.github/workflows/build-flutter-demo.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: projects/flutter_demo
        run: |
          flutter pub get
          flutter build web --base-href /flutter_demo/ --release

      - name: Commit build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f projects/flutter_demo/build/web
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Build flutter_demo web output"
            git push
          fi
