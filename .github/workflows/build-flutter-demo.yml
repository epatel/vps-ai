name: Build Flutter Demo

on:
  push:
    branches: [main]
    paths:
      - 'projects/flutter_demo/**'
      - '.github/workflows/build-flutter-demo.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter web
        working-directory: projects/flutter_demo
        run: |
          flutter pub get
          flutter build web --base-href /flutter_demo/ --release

      - name: Create PR with build output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f projects/flutter_demo/build/web
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          BRANCH="build/flutter-demo-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "Build flutter_demo web output"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "Build flutter_demo web output" \
            --body "Automated build of flutter_demo web output triggered by push to main." \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
