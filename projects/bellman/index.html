<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0f08" />
  <meta name="description" content="A mystery pub walk through the candlelit alleys of 18th-century Stockholm." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>The Stockholm Mystery — A Pub Walk</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IM+Fell+English:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div class="vignette" aria-hidden="true"></div>
  <div class="flicker" aria-hidden="true"></div>

  <main id="app" class="app" aria-live="polite">
    <!-- Routed view renders here -->
  </main>

  <footer class="footer">
    <div id="lang-toggle" class="lang-toggle" role="group" aria-label="Language">
      <button type="button" data-lang="en" aria-pressed="false" title="English">EN</button>
      <span class="lang-sep" aria-hidden="true">|</span>
      <button type="button" data-lang="sv" aria-pressed="false" title="Svenska">SV</button>
    </div>
    <span class="footer-sep">·</span>
    <button id="reset-btn" class="link-btn" type="button" title="Reset all progress">
      Reset progress
    </button>
    <span class="footer-sep">·</span>
    <span class="footer-text">Gamla stan, anno 1789</span>
  </footer>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
