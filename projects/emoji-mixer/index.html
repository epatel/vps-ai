<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emoji Mixer</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #1b1e28;
    --panel2: #232734;
    --accent: #ffb648;
    --accent2: #6c8cff;
    --text: #e8eaf0;
    --muted: #9aa0b4;
    --danger: #ff5d6c;
    --border: #2e3342;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    overscroll-behavior: none;
  }
  body { display: flex; flex-direction: column; height: 100vh; }

  header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 18px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header h1 .em { font-weight: 400; }
  header .spacer { flex: 1; }
  .btn {
    background: var(--panel2); color: var(--text); border: 1px solid var(--border);
    border-radius: 9px; padding: 8px 12px; font-size: 14px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px; user-select: none;
    transition: background .12s, border-color .12s, transform .05s;
  }
  select.btn { appearance: none; -webkit-appearance: none; padding-right: 12px; }
  .btn:hover { background: #2b3040; }
  .btn:active { transform: scale(.96); }
  .btn.primary { background: var(--accent); color: #20160a; border-color: var(--accent); font-weight: 700; }
  .btn.primary:hover { background: #ffc269; }
  .btn.danger { color: var(--danger); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  main {
    flex: 1; display: flex; min-height: 0; overflow: hidden;
  }

  /* Mixing area */
  .stage-wrap {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
    padding: 12px; gap: 10px;
  }
  .stage-frame {
    flex: 1; position: relative; border-radius: 14px; overflow: hidden;
    border: 1px solid var(--border);
    background:
      linear-gradient(45deg, #1a1d27 25%, transparent 25%),
      linear-gradient(-45deg, #1a1d27 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #1a1d27 75%),
      linear-gradient(-45deg, transparent 75%, #1a1d27 75%);
    background-size: 24px 24px;
    background-position: 0 0, 0 12px, 12px -12px, -12px 0px;
    background-color: #15171f;
    display: flex; align-items: center; justify-content: center;
    min-height: 0;
  }
  .stage-frame.drag-over { border-color: var(--accent2); box-shadow: inset 0 0 0 2px var(--accent2); }
  #stage { display: block; touch-action: none; cursor: grab; }
  #stage.dragging { cursor: grabbing; }
  .stage-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    color: var(--muted); font-size: 15px; text-align: center; pointer-events: none;
    width: 80%;
  }

  /* Tool area */
  .tools {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 10px;
  }
  .tools .group { display: flex; gap: 6px; align-items: center; }
  .tools .sep { width: 1px; align-self: stretch; background: var(--border); margin: 0 2px; }
  .tools .label { color: var(--muted); font-size: 12px; margin-right: 2px; }
  .tbtn {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    width: 40px; height: 40px; border-radius: 9px; font-size: 18px; cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center; user-select: none;
    transition: background .12s, transform .05s;
  }
  .tbtn:hover { background: #2b3040; }
  .tbtn:active { transform: scale(.92); }
  .tbtn.danger { color: var(--danger); }
  .tbtn:disabled { opacity: .35; cursor: not-allowed; }

  /* Selection panel */
  .sel-panel {
    width: 100%; display: flex; gap: 14px; align-items: center; flex-wrap: wrap;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 12px; padding: 8px 12px;
  }
  .sel-panel .field { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 120px; }
  .sel-panel label { font-size: 11px; color: var(--muted); }
  .sel-panel input[type=range] { width: 100%; accent-color: var(--accent); }
  .sel-panel .cur { font-size: 22px; }
  .sel-panel .empty { color: var(--muted); font-size: 13px; }

  /* Emoji picker */
  .picker {
    width: 320px; max-width: 42vw; display: flex; flex-direction: column;
    background: var(--panel); border-left: 1px solid var(--border);
  }
  .picker .picker-head {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px;
  }
  .picker .picker-head .ttl { font-size: 13px; color: var(--muted); font-weight: 600; }
  #search {
    width: 100%; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px; outline: none;
  }
  #search:focus { border-color: var(--accent2); }
  .cats { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
  .cat {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 5px 8px; font-size: 17px; cursor: pointer; flex: 0 0 auto;
  }
  .cat.active { border-color: var(--accent); background: #2b2415; }
  .grid {
    flex: 1; overflow-y: auto; padding: 8px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(44px, 1fr));
    gap: 4px; align-content: start;
  }
  .grid .e {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-size: 26px; border-radius: 8px; cursor: pointer; user-select: none;
    background: transparent; border: none;
  }
  .grid .e:hover { background: var(--panel2); }
  .grid .e:active { transform: scale(.85); }
  .grid .none { grid-column: 1/-1; color: var(--muted); text-align: center; padding: 20px; font-size: 13px; }

  /* Mobile layout */
  @media (max-width: 720px) {
    main { flex-direction: column; }
    .picker {
      width: 100%; max-width: 100%; border-left: none; border-top: 1px solid var(--border);
      height: 38vh; min-height: 200px;
    }
    .stage-wrap { padding: 8px; }
    header h1 { font-size: 16px; }
    .btn { padding: 7px 10px; font-size: 13px; }
  }
  .toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #20160a; padding: 10px 16px; border-radius: 10px;
    font-weight: 600; font-size: 14px; opacity: 0; pointer-events: none;
    transition: opacity .25s, transform .25s; z-index: 50;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
</style>
</head>
<body>
  <header>
    <h1><span class="em">рҹҺЁ</span> Emoji Mixer</h1>
    <div class="spacer"></div>
    <select class="btn" id="renderMode" title="How emojis are drawn. SVG modes stay crisp at any size; HD Native keeps your platform's emoji look.">
      <option value="supersample">рҹ–ҢпёҸ HD Native</option>
      <option value="twemoji">рҹҺЁ Twemoji (SVG)</option>
      <option value="noto">рҹҺЁ Noto (SVG)</option>
    </select>
    <button class="btn" id="imageBtn" title="Add an image вҖ” or drag &amp; drop / paste one onto the canvas">рҹ–јпёҸ Image</button>
    <input type="file" id="imageInput" accept="image/*" multiple hidden>
    <button class="btn" id="clearBtn" title="Remove all emojis and images from the mixing area">рҹ§№ Clear</button>
    <button class="btn primary" id="downloadBtn" title="Download a transparent PNG cropped tightly to your emojis">в¬ҮпёҸ PNG</button>
    <button class="btn" id="copyBtn" title="Copy the PNG to your clipboard">рҹ“Ӣ Copy</button>
  </header>

  <main>
    <div class="stage-wrap">
      <div class="stage-frame" id="stageFrame">
        <canvas id="stage" title="Drag an emoji to move it. Drag the orange corner handle to scale & rotate. Press Esc to deselect."></canvas>
        <div class="stage-hint" id="hint">Tap an emoji on the right to add it вҖ” or drop / paste an image here.<br>Drag to move вҖў corner handle to scale &amp; rotate.</div>
      </div>

      <!-- Tool area -->
      <div class="tools">
        <div class="group">
          <span class="label">Layer</span>
          <button class="tbtn" id="layerUp" title="Bring selected emoji forward one layer (])">в¬ҶпёҸ</button>
          <button class="tbtn" id="layerDown" title="Send selected emoji backward one layer ([)">в¬ҮпёҸ</button>
          <button class="tbtn" id="layerTop" title="Bring selected emoji to the front">вҸ«</button>
          <button class="tbtn" id="layerBottom" title="Send selected emoji to the back">вҸ¬</button>
        </div>
        <div class="sep"></div>
        <div class="group">
          <span class="label">Transform</span>
          <button class="tbtn" id="scaleUp" title="Scale selected emoji up">вһ•</button>
          <button class="tbtn" id="scaleDown" title="Scale selected emoji down">вһ–</button>
          <button class="tbtn" id="rotL" title="Rotate selected emoji 15В° left">вҶә</button>
          <button class="tbtn" id="rotR" title="Rotate selected emoji 15В° right">вҶ»</button>
          <button class="tbtn" id="mirror" title="Mirror selected emoji left вҶ” right (M)">рҹӘһ</button>
        </div>
        <div class="sep"></div>
        <div class="group">
          <span class="label">Edit</span>
          <button class="tbtn" id="duplicate" title="Duplicate selected emoji (D)">в§ү</button>
          <button class="tbtn danger" id="remove" title="Remove selected emoji (Delete)">рҹ—‘пёҸ</button>
        </div>
      </div>

      <!-- Selected emoji panel -->
      <div class="sel-panel" id="selPanel">
        <div class="empty" id="selEmpty">No emoji selected вҖ” tap one in the mixing area.</div>
        <div class="cur" id="selCur" style="display:none"></div>
        <div class="field" id="fScale" style="display:none">
          <label>Scale: <span id="scaleVal"></span></label>
          <input type="range" id="scaleRange" min="20" max="400" step="1" title="Resize the selected emoji">
        </div>
        <div class="field" id="fRot" style="display:none">
          <label>Rotation: <span id="rotVal"></span>В°</label>
          <input type="range" id="rotRange" min="0" max="360" step="1" title="Rotate the selected emoji">
        </div>
      </div>
    </div>

    <!-- Emoji picker matrix -->
    <div class="picker">
      <div class="picker-head">
        <div class="ttl">Emoji Selection</div>
        <input type="text" id="search" placeholder="рҹ”Қ Search emojisвҖҰ" title="Search emojis by keyword (e.g. fire, heart, dog)">
        <div class="cats" id="cats"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

const STORAGE_KEY = "emoji-mixer-state-v1";

/* ---------------- State ---------------- */
const stage = document.getElementById("stage");
const ctx = stage.getContext("2d");
let DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));

let items = [];        // {id, emoji, x, y, scale, rot, flip}
let selectedId = null;
let nextId = 1;

/* logical canvas size (CSS px) */
let W = 800, H = 600;

const BASE_SIZE = 120; // px font size at scale 1.0

/* ---------------- Render mode (emoji art source) ----------------
   "supersample" вҖ” draw the platform emoji font into a higher-resolution
                   backing store so large emojis antialias smoothly.
   "twemoji"/"noto" вҖ” draw vector SVG glyphs (crisp at ANY size), loaded
                   from a CDN with CORS so the canvas stays exportable. */
const RENDER_MODE_KEY = "emoji-mixer-render-mode";
let renderMode = localStorage.getItem(RENDER_MODE_KEY) || "supersample";

const SVG_BASE = {
  twemoji: "https://cdn.jsdelivr.net/gh/twitter/twemoji@v14.0.2/assets/svg/",
  noto:    "https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/svg/",
};

/* device-pixel multiplier; supersample mode renders extra-large then downscales */
function deviceScale() {
  return Math.min(4, DPR * (renderMode === "supersample" ? 2 : 1));
}

/* emoji string -> hex codepoints (dropping VS16, matching twemoji/noto filenames) */
function emojiCodepoints(emoji) {
  const cps = [];
  for (const ch of emoji) {
    const cp = ch.codePointAt(0);
    if (cp === 0xFE0F) continue;
    cps.push(cp.toString(16));
  }
  return cps;
}
const NOTO_FLAGS_BASE = "https://cdn.jsdelivr.net/gh/googlefonts/noto-emoji@main/third_party/region-flags/svg/";
/* two regional-indicator symbols -> ISO 3166 alpha-2 code (e.g. рҹҮёрҹҮӘ -> "SE"), else null */
function regionCode(emoji) {
  const chars = [...emoji];
  const ind = chars.every(c => { const cp = c.codePointAt(0); return cp >= 0x1F1E6 && cp <= 0x1F1FF; });
  if (!ind || chars.length !== 2) return null;
  return chars.map(c => String.fromCharCode(65 + c.codePointAt(0) - 0x1F1E6)).join("");
}
function glyphURL(emoji, mode) {
  const cps = emojiCodepoints(emoji);
  if (!cps.length || !SVG_BASE[mode]) return null;
  if (mode === "noto") {
    const rc = regionCode(emoji);                 // Noto keeps country flags in a separate set
    if (rc) return NOTO_FLAGS_BASE + rc + ".svg";
    return SVG_BASE.noto + "emoji_u" + cps.join("_") + ".svg";
  }
  return SVG_BASE.twemoji + cps.join("-") + ".svg";
}

/* Async-loaded SVG glyph cache. glyphReady() returns a ready Image, or null
   (not loaded yet / unavailable) so callers fall back to the platform font. */
const glyphCache = {};   // key -> Image | null (null = failed/unavailable)
const glyphLoading = {}; // key -> Promise
function glyphKey(emoji, mode) { return mode + "|" + emoji; }
function loadGlyph(emoji, mode = renderMode) {
  const k = glyphKey(emoji, mode);
  if (k in glyphCache) return Promise.resolve(glyphCache[k]);
  if (glyphLoading[k]) return glyphLoading[k];
  const url = glyphURL(emoji, mode);
  if (!url) { glyphCache[k] = null; return Promise.resolve(null); }
  const p = new Promise((res) => {
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => { glyphCache[k] = img; delete glyphLoading[k]; scheduleRender(); res(img); };
    img.onerror = () => { glyphCache[k] = null; delete glyphLoading[k]; res(null); };
    img.src = url;
  });
  glyphLoading[k] = p;
  return p;
}
function glyphReady(emoji) {
  if (renderMode === "supersample") return null;
  const k = glyphKey(emoji, renderMode);
  if (k in glyphCache) return glyphCache[k];
  loadGlyph(emoji);
  return null;
}

let renderQueued = false;
function scheduleRender() {
  if (renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(() => { renderQueued = false; render(); });
}

/* Imported-image items: cache decoded <img> by their data URL (or remote URL).
   Items carry { src } and are otherwise transformed exactly like emojis. */
const imageCache = {};
function imageFor(it) {
  let img = imageCache[it.src];
  if (img === undefined) {
    img = new Image();
    img.onload = () => scheduleRender();
    img.onerror = () => {};
    img.src = it.src;
    imageCache[it.src] = img;
  }
  return img && img.complete && (img.naturalWidth || img.width) ? img : null;
}
function ensureImage(src) {
  return new Promise((res) => {
    let img = imageCache[src];
    if (img && img.complete && (img.naturalWidth || img.width)) return res(img);
    img = new Image();
    img.onload = () => { imageCache[src] = img; res(img); };
    img.onerror = () => res(null);
    img.src = src;
    imageCache[src] = img;
  });
}

/* Bitmap to draw for an item: an imported image, or (for emojis) the SVG glyph. */
function itemImage(it) {
  if (it.src) return imageFor(it);
  return glyphReady(it.emoji);
}

/* Paint one item onto a context (shared by the live canvas and PNG export). */
function paintItem(c, it) {
  c.save();
  c.translate(it.x, it.y);
  c.rotate(it.rot);
  if (it.flip) c.scale(-1, 1);
  const size = BASE_SIZE * it.scale;
  const img = itemImage(it);
  if (img) {
    c.imageSmoothingEnabled = true;
    c.imageSmoothingQuality = "high";
    // fit into a sizeГ—size box, preserving aspect (flags/photos aren't square)
    const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
    const f = size / Math.max(iw, ih);
    const dw = iw * f, dh = ih * f;
    c.drawImage(img, -dw / 2, -dh / 2, dw, dh);
  } else if (it.emoji) {
    c.font = `${size}px ${EMOJI_FONT}`;
    c.textAlign = "center";
    c.textBaseline = "middle";
    c.fillText(it.emoji, 0, 0);
  }
  // image items not yet decoded paint nothing this frame; onload re-renders.
  c.restore();
}

/* ---------------- Persistence ---------------- */
function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ items, selectedId, nextId }));
  } catch (e) {}
}
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (Array.isArray(s.items)) {
      items = s.items;
      selectedId = s.selectedId ?? null;
      nextId = s.nextId ?? (items.reduce((m, i) => Math.max(m, i.id), 0) + 1);
    }
  } catch (e) {}
}

/* ---------------- Canvas sizing ---------------- */
function resizeStage() {
  const frame = document.getElementById("stageFrame");
  const rect = frame.getBoundingClientRect();
  // keep some padding inside the frame
  W = Math.max(200, Math.floor(rect.width - 4));
  H = Math.max(200, Math.floor(rect.height - 4));
  DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
  const ds = deviceScale();
  stage.style.width = W + "px";
  stage.style.height = H + "px";
  stage.width = Math.floor(W * ds);
  stage.height = Math.floor(H * ds);
  render();
}

/* ---------------- Item geometry ---------------- */
function itemById(id) { return items.find(i => i.id === id); }
function selected() { return selectedId ? itemById(selectedId) : null; }

const EMOJI_FONT = `"Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif`;

/* Measure the actual rendered pixel bounds of an emoji glyph (at BASE_SIZE,
   relative to the centre origin). Emoji glyphs are not perfectly square nor
   centred, so we scan rendered pixels once per emoji and cache the result. */
/* Centred BASE_SIZE box matching an image's aspect ratio (longest side = BASE_SIZE). */
function aspectBox(img) {
  const iw = img.naturalWidth || img.width, ih = img.naturalHeight || img.height;
  const mx = Math.max(iw, ih) || 1;
  const hw = (BASE_SIZE / 2) * (iw / mx), hh = (BASE_SIZE / 2) * (ih / mx);
  return { left: -hw, right: hw, top: -hh, bottom: hh };
}

const metricsCache = {};
function emojiMetrics(emoji) {
  // In SVG modes the glyph is drawn from an image fit into a BASE_SIZE box
  // (aspect preserved), so the selection bounds must follow the image, not the
  // platform-font glyph. Falls through to the native measurement until the
  // image has loaded (and a re-render then refreshes the box).
  if (renderMode !== "supersample") {
    const img = glyphReady(emoji);
    if (img) return aspectBox(img);
  }
  if (metricsCache[emoji]) return metricsCache[emoji];
  const pad = 24;
  const dim = BASE_SIZE + pad * 2;
  const c = document.createElement("canvas");
  c.width = dim; c.height = dim;
  const cx = c.getContext("2d");
  const ox = dim / 2, oy = dim / 2;
  cx.font = `${BASE_SIZE}px ${EMOJI_FONT}`;
  cx.textAlign = "center";
  cx.textBaseline = "middle";
  cx.fillText(emoji, ox, oy);
  let minX = dim, minY = dim, maxX = -1, maxY = -1;
  try {
    const data = cx.getImageData(0, 0, dim, dim).data;
    for (let y = 0; y < dim; y++) {
      for (let x = 0; x < dim; x++) {
        if (data[(y * dim + x) * 4 + 3] > 8) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
  } catch (e) { /* getImageData may throw if tainted вҖ” fall back below */ }
  let box;
  if (maxX < 0) {
    // nothing drawn / unmeasurable вҖ” fall back to a centred square
    const h = BASE_SIZE / 2;
    box = { left: -h, right: h, top: -h, bottom: h };
  } else {
    box = { left: minX - ox, right: maxX + 1 - ox, top: minY - oy, bottom: maxY + 1 - oy };
  }
  metricsCache[emoji] = box;
  return box;
}

/* BASE_SIZE-unit bounds for any item (imported image or emoji). */
function itemMetrics(it) {
  if (it.src) {
    const img = imageFor(it);
    return img ? aspectBox(img) : { left: -BASE_SIZE / 2, right: BASE_SIZE / 2, top: -BASE_SIZE / 2, bottom: BASE_SIZE / 2 };
  }
  return emojiMetrics(it.emoji);
}

/* Bounding box of an item in its own (pre-rotation) space, including scale & flip. */
function itemBox(it) {
  const m = itemMetrics(it);
  const s = it.scale;
  let left = m.left * s, right = m.right * s;
  if (it.flip) { const nl = -right, nr = -left; left = nl; right = nr; }
  return { left, right, top: m.top * s, bottom: m.bottom * s };
}

/* convert client (mouse/touch) coords to logical canvas coords */
function toLocal(clientX, clientY) {
  const r = stage.getBoundingClientRect();
  return { x: (clientX - r.left) * (W / r.width), y: (clientY - r.top) * (H / r.height) };
}

/* rotate a point around item center, inverse вҖ” returns local coords relative to item (pre-rotation) */
function pointInItemSpace(it, px, py) {
  const dx = px - it.x, dy = py - it.y;
  const c = Math.cos(-it.rot), s = Math.sin(-it.rot);
  return { x: dx * c - dy * s, y: dx * s + dy * c };
}

function hitTest(px, py) {
  // topmost first
  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    const p = pointInItemSpace(it, px, py);
    const b = itemBox(it);
    if (p.x >= b.left && p.x <= b.right && p.y >= b.top && p.y <= b.bottom) return it;
  }
  return null;
}

/* world position of the scale/rotate handle (bottom-right corner of the glyph box) */
function handlePos(it) {
  const b = itemBox(it);
  const c = Math.cos(it.rot), s = Math.sin(it.rot);
  const x = b.right, y = b.bottom;
  return { x: it.x + (x * c - y * s), y: it.y + (x * s + y * c) };
}

/* Axis-aligned bounding box of all items in world (canvas) coordinates. */
function worldBBox() {
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const it of items) {
    const b = itemBox(it);
    const c = Math.cos(it.rot), s = Math.sin(it.rot);
    const corners = [[b.left, b.top], [b.right, b.top], [b.right, b.bottom], [b.left, b.bottom]];
    for (const [x, y] of corners) {
      const wx = it.x + (x * c - y * s), wy = it.y + (x * s + y * c);
      if (wx < minX) minX = wx;
      if (wx > maxX) maxX = wx;
      if (wy < minY) minY = wy;
      if (wy > maxY) maxY = wy;
    }
  }
  return { minX, minY, maxX, maxY };
}

/* ---------------- Rendering ---------------- */
function render() {
  const ds = deviceScale();
  ctx.setTransform(ds, 0, 0, ds, 0, 0);
  ctx.clearRect(0, 0, W, H);

  for (const it of items) paintItem(ctx, it);

  // selection overlay
  const sel = selected();
  if (sel) drawSelection(sel);

  document.getElementById("hint").style.display = items.length ? "none" : "block";
}

function drawSelection(it) {
  const b = itemBox(it);
  ctx.save();
  ctx.translate(it.x, it.y);
  ctx.rotate(it.rot);
  ctx.strokeStyle = "#6c8cff";
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(b.left, b.top, b.right - b.left, b.bottom - b.top);
  ctx.setLineDash([]);
  // handle at bottom-right corner of the actual glyph box
  ctx.fillStyle = "#ffb648";
  ctx.strokeStyle = "#20160a";
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(b.right, b.bottom, 9, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
  ctx.restore();
}

/* ---------------- Interaction ---------------- */
let drag = null; // {mode:'move'|'transform', startAngle, startDist, startScale, startRot, offx, offy}

const HANDLE_R = 18;

function onPointerDown(e) {
  e.preventDefault();
  const p = toLocal(e.clientX, e.clientY);

  // check handle of currently selected item first
  const sel = selected();
  if (sel) {
    const hp = handlePos(sel);
    if (Math.hypot(p.x - hp.x, p.y - hp.y) <= HANDLE_R) {
      const dx = p.x - sel.x, dy = p.y - sel.y;
      drag = {
        mode: "transform", id: sel.id,
        startAngle: Math.atan2(dy, dx),
        startDist: Math.hypot(dx, dy),
        startScale: sel.scale,
        startRot: sel.rot,
      };
      stage.classList.add("dragging");
      stage.setPointerCapture?.(e.pointerId);
      return;
    }
  }

  const hit = hitTest(p.x, p.y);
  if (hit) {
    // move to top of selection visually? keep order; just select
    selectedId = hit.id;
    drag = { mode: "move", id: hit.id, offx: p.x - hit.x, offy: p.y - hit.y };
    stage.classList.add("dragging");
    stage.setPointerCapture?.(e.pointerId);
    syncSelPanel();
    render();
  } else {
    if (selectedId !== null) { selectedId = null; syncSelPanel(); render(); }
  }
}

function onPointerMove(e) {
  if (!drag) return;
  e.preventDefault();
  const it = itemById(drag.id);
  if (!it) { drag = null; return; }
  const p = toLocal(e.clientX, e.clientY);

  if (drag.mode === "move") {
    it.x = p.x - drag.offx;
    it.y = p.y - drag.offy;
  } else if (drag.mode === "transform") {
    const dx = p.x - it.x, dy = p.y - it.y;
    const ang = Math.atan2(dy, dx);
    const dist = Math.hypot(dx, dy);
    it.rot = drag.startRot + (ang - drag.startAngle);
    let sc = drag.startScale * (dist / Math.max(8, drag.startDist));
    it.scale = Math.min(4, Math.max(0.2, sc));
  }
  render();
  syncSelPanel();
}

function onPointerUp(e) {
  if (drag) { drag = null; stage.classList.remove("dragging"); save(); }
}

stage.addEventListener("pointerdown", onPointerDown);
window.addEventListener("pointermove", onPointerMove);
window.addEventListener("pointerup", onPointerUp);
window.addEventListener("pointercancel", onPointerUp);

/* ---------------- Add image: file picker, drag & drop, paste ---------------- */
const imageInput = document.getElementById("imageInput");
document.getElementById("imageBtn").onclick = () => imageInput.click();
imageInput.onchange = async () => {
  await addImageFiles(imageInput.files);
  imageInput.value = ""; // allow re-picking the same file
};

const stageFrame = document.getElementById("stageFrame");
["dragenter", "dragover"].forEach(ev =>
  stageFrame.addEventListener(ev, (e) => { e.preventDefault(); stageFrame.classList.add("drag-over"); }));
["dragleave", "dragend"].forEach(ev =>
  stageFrame.addEventListener(ev, () => stageFrame.classList.remove("drag-over")));
stageFrame.addEventListener("drop", async (e) => {
  e.preventDefault();
  stageFrame.classList.remove("drag-over");
  const p = toLocal(e.clientX, e.clientY); // drop position in canvas coords
  if (e.dataTransfer.files && e.dataTransfer.files.length) {
    await addImageFiles(e.dataTransfer.files, p.x, p.y);
  } else {
    // image dragged from another tab arrives as a URL, not a file
    const url = e.dataTransfer.getData("text/uri-list") || e.dataTransfer.getData("text/plain");
    if (url && /^https?:\/\//.test(url.trim())) addImageSrc(url.trim(), p.x, p.y);
  }
});

window.addEventListener("paste", (e) => {
  const items_ = e.clipboardData && e.clipboardData.items;
  if (!items_) return;
  const files = [...items_].filter(i => i.kind === "file" && i.type.startsWith("image/"))
                           .map(i => i.getAsFile()).filter(Boolean);
  if (files.length) { e.preventDefault(); addImageFiles(files); }
});

// Stop an image dropped just outside the canvas from navigating the page away.
window.addEventListener("dragover", (e) => e.preventDefault());
window.addEventListener("drop", (e) => e.preventDefault());

/* ---------------- Add emoji ---------------- */
function addEmoji(emoji) {
  const jitter = (Math.random() - 0.5);
  const it = {
    id: nextId++, emoji,
    x: W / 2 + jitter * 60,
    y: H / 2 + jitter * 60,
    scale: 1, rot: 0, flip: false,
  };
  items.push(it);
  selectedId = it.id;
  render(); syncSelPanel(); save();
}

/* ---------------- Imported images ---------------- */
const MAX_IMG_DIM = 1600; // downscale huge images to keep storage/perf sane

/* Read an image File/Blob into a (possibly downscaled) data URL. */
function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onerror = () => reject(fr.error);
    fr.onload = () => {
      const url = fr.result;
      const img = new Image();
      img.onerror = () => reject(new Error("decode failed"));
      img.onload = () => {
        const mx = Math.max(img.naturalWidth, img.naturalHeight);
        if (mx <= MAX_IMG_DIM) return resolve(url); // keep original (preserves format/transparency)
        const f = MAX_IMG_DIM / mx;
        const c = document.createElement("canvas");
        c.width = Math.round(img.naturalWidth * f);
        c.height = Math.round(img.naturalHeight * f);
        c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
        resolve(c.toDataURL("image/png"));
      };
      img.src = url;
    };
    fr.readAsDataURL(file);
  });
}

/* Add an imported image as an item, placed at (x,y) in canvas coords (default: centre). */
async function addImageSrc(src, x = W / 2, y = H / 2) {
  const img = await ensureImage(src);
  if (!img) { toast("Couldn't load that image"); return; }
  // default display size: longest side вүҲ 45% of the smaller canvas dimension
  const target = Math.min(W, H) * 0.45;
  const it = {
    id: nextId++, src,
    x, y,
    scale: Math.max(0.2, Math.min(4, target / BASE_SIZE)),
    rot: 0, flip: false,
  };
  items.push(it);
  selectedId = it.id;
  render(); syncSelPanel(); save();
  toast("Image added рҹ–јпёҸ");
}

/* Pull image files out of a drop / paste / file-input and add them. */
async function addImageFiles(files, x, y) {
  const imgs = [...files].filter(f => f.type.startsWith("image/"));
  if (!imgs.length) return false;
  for (const f of imgs) {
    try { await addImageSrc(await fileToDataURL(f), x, y); }
    catch (e) { toast("Couldn't read an image"); }
  }
  return true;
}

/* ---------------- Tool actions ---------------- */
function requireSel() {
  const s = selected();
  if (!s) { toast("Select an item first"); return null; }
  return s;
}
function idx(it) { return items.indexOf(it); }

document.getElementById("remove").onclick = () => {
  const s = requireSel(); if (!s) return;
  items = items.filter(i => i.id !== s.id);
  selectedId = null; render(); syncSelPanel(); save();
};
document.getElementById("duplicate").onclick = () => {
  const s = requireSel(); if (!s) return;
  const copy = { ...s, id: nextId++, x: s.x + 24, y: s.y + 24 };
  items.push(copy); selectedId = copy.id; render(); syncSelPanel(); save();
};
document.getElementById("mirror").onclick = () => {
  const s = requireSel(); if (!s) return;
  s.flip = !s.flip; render(); save();
};
document.getElementById("layerUp").onclick = () => {
  const s = requireSel(); if (!s) return;
  const i = idx(s); if (i < items.length - 1) { items.splice(i, 1); items.splice(i + 1, 0, s); render(); save(); }
};
document.getElementById("layerDown").onclick = () => {
  const s = requireSel(); if (!s) return;
  const i = idx(s); if (i > 0) { items.splice(i, 1); items.splice(i - 1, 0, s); render(); save(); }
};
document.getElementById("layerTop").onclick = () => {
  const s = requireSel(); if (!s) return;
  items = items.filter(i => i.id !== s.id); items.push(s); render(); save();
};
document.getElementById("layerBottom").onclick = () => {
  const s = requireSel(); if (!s) return;
  items = items.filter(i => i.id !== s.id); items.unshift(s); render(); save();
};
document.getElementById("scaleUp").onclick = () => { const s = requireSel(); if (!s) return; s.scale = Math.min(4, s.scale * 1.12); render(); syncSelPanel(); save(); };
document.getElementById("scaleDown").onclick = () => { const s = requireSel(); if (!s) return; s.scale = Math.max(0.2, s.scale / 1.12); render(); syncSelPanel(); save(); };
document.getElementById("rotL").onclick = () => { const s = requireSel(); if (!s) return; s.rot -= Math.PI / 12; render(); syncSelPanel(); save(); };
document.getElementById("rotR").onclick = () => { const s = requireSel(); if (!s) return; s.rot += Math.PI / 12; render(); syncSelPanel(); save(); };

document.getElementById("clearBtn").onclick = () => {
  if (!items.length) return;
  if (confirm("Remove everything from the mixing area?")) {
    items = []; selectedId = null; render(); syncSelPanel(); save();
  }
};

/* ---------------- Render mode selector ---------------- */
const renderModeEl = document.getElementById("renderMode");
renderModeEl.value = renderMode;
renderModeEl.onchange = () => {
  renderMode = renderModeEl.value;
  try { localStorage.setItem(RENDER_MODE_KEY, renderMode); } catch (e) {}
  if (renderMode !== "supersample") {
    // warm the cache for what's already on the canvas, then repaint
    [...new Set(items.map(i => i.emoji))].forEach(e => loadGlyph(e));
  }
  resizeStage(); // backing-store resolution depends on the mode
};

/* ---------------- Selected emoji panel (sliders) ---------------- */
const scaleRange = document.getElementById("scaleRange");
const rotRange = document.getElementById("rotRange");
function syncSelPanel() {
  const s = selected();
  const empty = document.getElementById("selEmpty");
  const cur = document.getElementById("selCur");
  const fScale = document.getElementById("fScale");
  const fRot = document.getElementById("fRot");
  const hasSel = !!s;
  empty.style.display = hasSel ? "none" : "block";
  cur.style.display = hasSel ? "block" : "none";
  fScale.style.display = hasSel ? "flex" : "none";
  fRot.style.display = hasSel ? "flex" : "none";
  // enable/disable tool buttons
  document.querySelectorAll(".tbtn").forEach(b => b.disabled = !hasSel);
  if (!s) return;
  cur.replaceChildren();
  if (s.src) {
    const im = document.createElement("img");
    im.src = s.src;
    im.style.cssText = "height:24px;width:auto;max-width:48px;object-fit:contain;border-radius:4px;vertical-align:middle";
    cur.appendChild(im);
  } else {
    cur.textContent = s.emoji;
  }
  scaleRange.value = Math.round(s.scale * 100);
  document.getElementById("scaleVal").textContent = (s.scale).toFixed(2) + "Г—";
  let deg = Math.round(((s.rot * 180 / Math.PI) % 360 + 360) % 360);
  rotRange.value = deg;
  document.getElementById("rotVal").textContent = deg;
}
scaleRange.oninput = () => { const s = selected(); if (!s) return; s.scale = (+scaleRange.value) / 100; render(); document.getElementById("scaleVal").textContent = s.scale.toFixed(2) + "Г—"; };
scaleRange.onchange = save;
rotRange.oninput = () => { const s = selected(); if (!s) return; s.rot = (+rotRange.value) * Math.PI / 180; render(); document.getElementById("rotVal").textContent = rotRange.value; };
rotRange.onchange = save;

/* ---------------- Emoji picker ---------------- */
const grid = document.getElementById("grid");
const catsEl = document.getElementById("cats");
const searchEl = document.getElementById("search");
let activeCat = 0;

function buildCats() {
  catsEl.innerHTML = "";
  CATEGORIES.forEach((c, i) => {
    const b = document.createElement("button");
    b.className = "cat" + (i === activeCat ? " active" : "");
    b.textContent = c.icon;
    b.title = c.name;
    b.onclick = () => { activeCat = i; searchEl.value = ""; buildCats(); renderGrid(); };
    catsEl.appendChild(b);
  });
}

function parseList(str) { return str.split(/\s+/).filter(Boolean); }

function renderGrid() {
  const q = searchEl.value.trim().toLowerCase();
  let emojis;
  if (q) {
    // Match by literal char, keyword, or category name; dedupe, keep order.
    const seen = new Set();
    emojis = [];
    CATEGORIES.forEach(c => {
      const catMatch = c.name.toLowerCase().includes(q);
      parseList(c.list).forEach(e => {
        const kw = KEYWORDS[e] || "";
        if ((catMatch || e.includes(q) || kw.includes(q)) && !seen.has(e)) {
          seen.add(e); emojis.push(e);
        }
      });
    });
  } else {
    emojis = parseList(CATEGORIES[activeCat].list);
  }
  grid.innerHTML = "";
  if (!emojis.length) {
    const d = document.createElement("div");
    d.className = "none"; d.textContent = "No emojis found.";
    grid.appendChild(d); return;
  }
  const frag = document.createDocumentFragment();
  emojis.forEach(e => {
    const b = document.createElement("button");
    b.className = "e"; b.textContent = e; b.title = "Add " + e;
    b.onclick = () => addEmoji(e);
    frag.appendChild(b);
  });
  grid.appendChild(frag);
}
searchEl.oninput = renderGrid;

/* ---------------- Download PNG ---------------- */
/* Trim fully-transparent borders off a canvas, returning a tight copy. */
function trimCanvas(src) {
  const w = src.width, h = src.height;
  const sctx = src.getContext("2d");
  let data;
  try { data = sctx.getImageData(0, 0, w, h).data; }
  catch (e) { return src; }
  let minX = w, minY = h, maxX = -1, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      if (data[(y * w + x) * 4 + 3] > 0) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) return src; // nothing drawn
  const tw = maxX - minX + 1, th = maxY - minY + 1;
  const out = document.createElement("canvas");
  out.width = tw; out.height = th;
  out.getContext("2d").drawImage(src, minX, minY, tw, th, 0, 0, tw, th);
  return out;
}

/* Build the tightly-trimmed export canvas for the current mix (shared by
   download and copy-to-clipboard). Returns null if there's nothing to export. */
async function buildExportCanvas() {
  if (!items.length) { toast("Add some emojis first"); return null; }
  // Make sure every glyph/image is decoded before drawing the export.
  const preloads = [];
  if (renderMode !== "supersample") {
    [...new Set(items.filter(i => i.emoji).map(i => i.emoji))].forEach(e => preloads.push(loadGlyph(e)));
  }
  items.filter(i => i.src).forEach(i => preloads.push(ensureImage(i.src)));
  if (preloads.length) await Promise.all(preloads);
  const scale = renderMode === "supersample" ? 3 : 2; // supersample the export for crispness
  const pad = 4;   // tiny margin so anti-aliased edges aren't clipped
  const bb = worldBBox();
  const minX = Math.floor(bb.minX) - pad;
  const minY = Math.floor(bb.minY) - pad;
  const bw = Math.max(1, Math.ceil(bb.maxX) - minX + pad);
  const bh = Math.max(1, Math.ceil(bb.maxY) - minY + pad);
  const out = document.createElement("canvas");
  out.width = bw * scale; out.height = bh * scale;
  const o = out.getContext("2d");
  o.scale(scale, scale);
  o.translate(-minX, -minY); // shift so the emoji bounds sit at the origin
  // transparent background by default
  for (const it of items) paintItem(o, it);
  // pixel-tight trim so the PNG contains only the emojis and nothing more
  return trimCanvas(out);
}

/* Promise wrapper for canvas.toBlob. */
function canvasToBlob(canvas, type) {
  return new Promise((resolve) => canvas.toBlob(resolve, type));
}

document.getElementById("downloadBtn").onclick = async () => {
  const canvas = await buildExportCanvas();
  if (!canvas) return;
  const blob = await canvasToBlob(canvas, "image/png");
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "emoji-mix.png";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  toast("PNG downloaded рҹҺү");
};

document.getElementById("copyBtn").onclick = async () => {
  if (!navigator.clipboard || typeof ClipboardItem === "undefined") {
    toast("Clipboard not supported вҖ” use в¬ҮпёҸ PNG"); return;
  }
  const canvas = await buildExportCanvas();
  if (!canvas) return;
  try {
    const blob = await canvasToBlob(canvas, "image/png");
    await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
    toast("Copied to clipboard рҹ“Ӣ");
  } catch (e) {
    toast("Copy failed вҖ” use в¬ҮпёҸ PNG");
  }
};

/* ---------------- Toast ---------------- */
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1600);
}

/* ---------------- Keyboard shortcuts ---------------- */
window.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  const s = selected();
  if ((e.key === "Delete" || e.key === "Backspace") && s) { e.preventDefault(); document.getElementById("remove").click(); }
  else if (e.key === "[" && s) document.getElementById("layerDown").click();
  else if (e.key === "]" && s) document.getElementById("layerUp").click();
  else if (e.key.toLowerCase() === "m" && s) document.getElementById("mirror").click();
  else if (e.key.toLowerCase() === "d" && s) document.getElementById("duplicate").click();
  else if (e.key === "Escape") { selectedId = null; syncSelPanel(); render(); }
});

/* ---------------- Init ---------------- */
load();
buildCats();
renderGrid();
window.addEventListener("resize", resizeStage);
resizeStage();
syncSelPanel();
</script>
