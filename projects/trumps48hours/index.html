<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-Minus Countdown</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0f;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Animated background */
  .bg-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,50,50,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,50,50,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPulse 4s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes gridPulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* Radial glow */
  .glow {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, rgba(255,40,40,0.12) 0%, transparent 70%);
    animation: glowPulse 3s ease-in-out infinite;
    z-index: 0;
  }

  @keyframes glowPulse {
    0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
    50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem;
  }

  .label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 1.2rem;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: rgba(255,100,100,0.7);
    margin-bottom: 1rem;
    animation: fadeInDown 1s ease-out;
  }

  .t-minus {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(2.5rem, 8vw, 6rem);
    letter-spacing: 0.05em;
    text-shadow:
      0 0 20px rgba(255,60,60,0.6),
      0 0 60px rgba(255,40,40,0.3),
      0 0 100px rgba(255,20,20,0.15);
    animation: fadeInUp 1s ease-out;
    line-height: 1.1;
  }

  .t-prefix {
    color: #ff4444;
  }

  .t-time {
    color: #fff;
  }

  .t-separator {
    color: #ff4444;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Individual digit boxes */
  .digits-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.2em;
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(3rem, 10vw, 7rem);
    margin-top: 0.5rem;
  }

  .digit-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .digit-pair {
    display: flex;
    gap: 4px;
  }

  .digit {
    background: rgba(255,40,40,0.08);
    border: 1px solid rgba(255,60,60,0.2);
    border-radius: 8px;
    padding: 0.1em 0.15em;
    width: 1.1em;
    text-align: center;
    color: #fff;
    text-shadow:
      0 0 15px rgba(255,60,60,0.5),
      0 0 40px rgba(255,40,40,0.2);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
  }

  .digit::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 49%;
    height: 1px;
    background: rgba(255,60,60,0.15);
  }

  .digit.flip {
    animation: digitFlip 0.4s ease-in-out;
  }

  @keyframes digitFlip {
    0% { transform: scaleY(1); }
    50% { transform: scaleY(0.85); background: rgba(255,40,40,0.15); }
    100% { transform: scaleY(1); }
  }

  .sep {
    color: #ff4444;
    font-size: 0.8em;
    animation: blink 1s step-end infinite;
    padding: 0 0.05em;
    align-self: flex-start;
    margin-top: 0.15em;
  }

  .digit-label {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,100,100,0.5);
    margin-top: 0.5rem;
  }

  .t-prefix-main {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(3rem, 10vw, 7rem);
    color: #ff4444;
    text-shadow:
      0 0 20px rgba(255,60,60,0.6),
      0 0 60px rgba(255,40,40,0.3);
    margin-right: 0.2em;
    align-self: flex-start;
    margin-top: 0.15em;
  }

  /* Progress bar */
  .progress-container {
    width: 100%;
    max-width: 100%;
    height: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 2px;
    margin: 2.5rem auto 0;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #ff4444, #ff6666);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(255,60,60,0.5);
    transition: width 1s linear;
  }

  /* Particle effects */
  .particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(255,60,60,0.6);
    border-radius: 50%;
    animation: particleFloat linear infinite;
  }

  @keyframes particleFloat {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* Finished state */
  .finished .t-prefix-main,
  .finished .sep { animation: none; }

  .finished .digit {
    background: rgba(255,40,40,0.2);
    border-color: rgba(255,60,60,0.5);
  }

  .done-message {
    font-family: 'Orbitron', monospace;
    font-weight: 700;
    font-size: clamp(1.5rem, 4vw, 2.5rem);
    color: #ff4444;
    text-shadow: 0 0 30px rgba(255,60,60,0.8);
    margin-top: 1.5rem;
    animation: doneFlash 1.5s ease-in-out infinite;
    display: none;
  }

  .finished .done-message { display: block; }

  @keyframes doneFlash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scanline */
  .scanline {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  .target-info {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    color: rgba(255,255,255,0.25);
    margin-top: 2rem;
    letter-spacing: 0.2em;
  }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="glow"></div>
<div class="scanline"></div>
<div class="particles" id="particles"></div>

<div class="container" id="container">
  <div class="label">Countdown to target</div>

  <div class="digits-row">
    <span class="t-prefix-main">T&minus;</span>

    <div class="digit-group">
      <div class="digit-pair">
        <div class="digit" id="h1">0</div>
        <div class="digit" id="h2">0</div>
      </div>
      <div class="digit-label">Hours</div>
    </div>

    <span class="sep">:</span>

    <div class="digit-group">
      <div class="digit-pair">
        <div class="digit" id="m1">0</div>
        <div class="digit" id="m2">0</div>
      </div>
      <div class="digit-label">Minutes</div>
    </div>

    <span class="sep">.</span>

    <div class="digit-group">
      <div class="digit-pair">
        <div class="digit" id="s1">0</div>
        <div class="digit" id="s2">0</div>
      </div>
      <div class="digit-label">Seconds</div>
    </div>
  </div>

  <div class="progress-container">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div class="done-message" id="doneMsg">TARGET REACHED</div>

  <div class="target-info">TARGET: 2026-03-23 23:44:00 GMT</div>
</div>

<script>
  // Target: March 23, 2026 at 23:44:00 GMT
  const TARGET = Date.UTC(2026, 2, 23, 23, 44, 0, 0); // month is 0-indexed
  // We'll estimate a "start" as 48h before target for progress bar
  const TOTAL_DURATION = 48 * 60 * 60 * 1000; // 48 hours in ms
  const START = TARGET - TOTAL_DURATION;

  const digits = {
    h1: document.getElementById('h1'),
    h2: document.getElementById('h2'),
    m1: document.getElementById('m1'),
    m2: document.getElementById('m2'),
    s1: document.getElementById('s1'),
    s2: document.getElementById('s2'),
  };

  const progressBar = document.getElementById('progressBar');
  const container = document.getElementById('container');
  const prev = { h1: '', h2: '', m1: '', m2: '', s1: '', s2: '' };

  function update() {
    const now = Date.now();
    let diff = TARGET - now;

    if (diff <= 0) {
      diff = 0;
      container.classList.add('finished');
    }

    const totalSec = Math.floor(diff / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;

    const vals = {
      h1: String(Math.floor(h / 10)),
      h2: String(h % 10),
      m1: String(Math.floor(m / 10)),
      m2: String(m % 10),
      s1: String(Math.floor(s / 10)),
      s2: String(s % 10),
    };

    for (const [key, val] of Object.entries(vals)) {
      if (prev[key] !== val) {
        digits[key].textContent = val;
        digits[key].classList.remove('flip');
        void digits[key].offsetWidth; // reflow
        digits[key].classList.add('flip');
        prev[key] = val;
      }
    }

    // Progress
    const elapsed = now - START;
    const pct = Math.max(0, Math.min(100, (elapsed / TOTAL_DURATION) * 100));
    progressBar.style.width = pct + '%';

    if (diff > 0) {
      requestAnimationFrame(update);
    }
  }

  // Create particles
  const particlesEl = document.getElementById('particles');
  for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + '%';
    p.style.animationDuration = (5 + Math.random() * 10) + 's';
    p.style.animationDelay = Math.random() * 10 + 's';
    p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
    particlesEl.appendChild(p);
  }

  update();
  // Also tick every second as a fallback
  setInterval(update, 1000);
</script>

</body>
</html>
